# dashboard/Taskfile.yml
version: "3"

tasks:
  setup:
    desc: Setup Dashboard dependencies
    cmds:
      - pnpm install
      - pnpm exec playwright install --with-deps

  dev:
    desc: Run Dashboard in dev mode
    cmds:
      - pnpm dev

  build:
    desc: Build Dashboard bundle
    cmds:
      - pnpm build

  test:
    desc: Run Dashboard unit tests
    cmds:
      - pnpm test

  test:e2e:
    desc: Run Dashboard E2E tests
    cmds:
      - pnpm exec playwright test

  lint:
    desc: Lint Dashboard
    cmds:
      - pnpm lint

  format:
    desc: Format Dashboard code
    cmds:
      - pnpm exec biome format . --write
