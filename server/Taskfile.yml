version: '3'

tasks:
  default:
    desc: Lists all available tasks
    cmds:
      - task --list
    silent: true

  tidy:
    desc: Run go mod tidy to clean up dependencies
    cmds:
      - go mod tidy

  mocks:
    desc: Regenerate go.uber.org/mock mocks into mocks/
    cmds:
      - go run go.uber.org/mock/mockgen -destination=mocks/auth.go -package=mocks github.com/kilip/opus/server/internal/auth Repository,PolicyService,OAuthProvider
      - go run go.uber.org/mock/mockgen -destination=mocks/logger.go -package=mocks github.com/kilip/opus/server/internal/shared/logger Logger
      - go run go.uber.org/mock/mockgen -destination=mocks/queue.go -package=mocks github.com/kilip/opus/server/internal/shared/queue Queue
      - go run go.uber.org/mock/mockgen -destination=mocks/eventbus.go -package=mocks github.com/kilip/opus/server/internal/shared/queue EventBus

  generate:
    desc: Run code generation (mockgen, ent, config schema, etc.)
    cmds:
      - task: mocks
      - go generate ./...

  test:
    desc: Run unit tests with race detector
    cmds:
      - task: lint
      - go test -race ./...

  test:integration:
    desc: Run unit and integration tests with race detector
    cmds:
      - go test -race -tags integration ./...

  lint:
    desc: Run formatter, tidy dependencies, and golangci-lint
    cmds:
      - go fmt ./...
      - go mod tidy
      - golangci-lint run ./...

  schema:
    desc: Generate JSON schema for configurations
    dir: internal/config
    cmds:
      - go run generate.go

  build:
    desc: Compile the server packages
    cmds:
      - go build ./...

  dev:
    desc: Run the server in development mode with hot reload (Air)
    cmds:
      - air

  db:generate:
    desc: Generate ent code
    cmds:
      - go generate ./ent/...

  db:migrate:diff:
    desc: Generate a new atlas migration
    cmds:
      - |
        atlas migrate diff {{.CLI_ARGS}} \
          --dir "file://ent/migrate/migrations" \
          --to "ent://ent/schema" \
          --dev-url "sqlite://dev?mode=memory&cache=shared&_fk=1"

