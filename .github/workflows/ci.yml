# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Lint API
        run: task api:lint

      - name: Test API
        run: task api:test:all

      - name: Lint Dashboard
        run: task dashboard:lint

      - name: Test Dashboard
        run: task dashboard:test
