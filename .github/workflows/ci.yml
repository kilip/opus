name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'server/go.mod'
          cache-dependency-path: 'server/go.sum'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: goinstall
          working-directory: server
          args: --timeout=5m

  server-test:
    name: Server Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'server/go.mod'
          cache-dependency-path: 'server/go.sum'

      - name: Install dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v -race -tags integration ./...

  dash-lint:
    name: Dash Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'dash/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome Check)
        run: pnpm check

      - name: Build
        run: pnpm build

  dash-test:
    name: Dash Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'dash/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm vitest run
