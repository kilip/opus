name: Build

on:
  push:
    branches: [main]

permissions:
  packages: write

jobs:
  build-api:
    name: Build API Binary (Snapshot)
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  build-push-images:
    name: Build & Push Docker Images (edge)
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          platforms: linux/amd64
          tags: ghcr.io/kilip/opus-api:edge
          cache-from: type=registry,ref=ghcr.io/kilip/opus-api:buildcache
          cache-to: type=registry,ref=ghcr.io/kilip/opus-api:buildcache,mode=max

      - name: Build and Push Dash Image
        uses: docker/build-push-action@v6
        with:
          context: ./dash
          push: true
          platforms: linux/amd64
          tags: ghcr.io/kilip/opus-dash:edge
          cache-from: type=registry,ref=ghcr.io/kilip/opus-dash:buildcache
          cache-to: type=registry,ref=ghcr.io/kilip/opus-dash:buildcache,mode=max