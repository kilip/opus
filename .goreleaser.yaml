# .goreleaser.yml
# GoReleaser configuration for Opus
# Docs: https://goreleaser.com/customization/

version: 2

project_name: opus

before:
  hooks:
    - sh -c 'cd api && go mod tidy'
    - sh -c 'cd api && go generate ./...'

builds:
  - id: opus
    binary: opus
    dir: api
    main: ./cmd/opus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/kilip/opus/api/internal/version.Version={{.Version}}
      - -X github.com/kilip/opus/api/internal/version.Commit={{.Commit}}
      - -X github.com/kilip/opus/api/internal/version.Date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: opus-archive
    ids:
      - opus
    name_template: >-
      {{ .ProjectName }}-
      {{- .Os }}-
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  abbrev: 0
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?!:.*$'
      order: 0
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))?!?:.*$'
      order: 1
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))?!?:.*$'
      order: 2
    - title: "Documentation"
      regexp: '^.*?docs(\(.+\))?!?:.*$'
      order: 3
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^ci"
      - "^test"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch

release:
  github:
    owner: kilip
    name: opus
  draft: false
  prerelease: auto
  make_latest: true
  header: |
    ## Opus {{ .Tag }}

    Self-hosted AI agent — autonomous, privacy-first, installable in minutes.

    ### Quick Install

    ```bash
    npx opus install
    ```

    Or download the binary for your platform below.
  footer: |
    ---
    **Full Changelog**: https://github.com/kilip/opus/compare/{{ .PreviousTag }}...{{ .Tag }}

dockers:
  - id: opus-api-amd64
    ids:
      - opus
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/kilip/opus-api:{{ .Tag }}-amd64"
      - "ghcr.io/kilip/opus-api:latest-amd64"
    dockerfile: api/Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=opus-api"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/kilip/opus"

  - id: opus-api-arm64
    ids:
      - opus
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/kilip/opus-api:{{ .Tag }}-arm64"
      - "ghcr.io/kilip/opus-api:latest-arm64"
    dockerfile: api/Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=opus-api"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/kilip/opus"

docker_manifests:
  - name_template: "ghcr.io/kilip/opus-api:{{ .Tag }}"
    image_templates:
      - "ghcr.io/kilip/opus-api:{{ .Tag }}-amd64"
      - "ghcr.io/kilip/opus-api:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/kilip/opus-api:latest"
    image_templates:
      - "ghcr.io/kilip/opus-api:latest-amd64"
      - "ghcr.io/kilip/opus-api:latest-arm64"