# opus/Taskfile.yml
version: "3"

dotenv: ['.env']

includes:
  api:
    taskfile: ./api/Taskfile.yml
    dir: ./api

  dash:
    taskfile: ./dash/Taskfile.yml
    dir: ./dash

tasks:
  setup:
    desc: Install all dependencies for api/ and dash/
    deps: [setup:env, api:setup, dash:setup]

  setup:env:
    desc: Create .env from .env.example if it doesn't exist
    cmds:
      - cp .env.example .env
    status:
      - test -f .env

  dev:
    desc: Start api/ and dash/ in development mode concurrently
    deps: [setup:env, api:dev, dash:dev]

  build:
    desc: Build api/ binary and dash/ production bundle
    deps: [api:build, dash:build]

  test:all:
    desc: Run all tests across api/ and dash/
    deps: [lint, api:test:all, dash:test]

  lint:
    desc: Lint api/ and dash/
    deps: [api:lint, dash:lint]

  migrate:
    desc: Run database migrations
    cmds:
      - task: api:migrate
