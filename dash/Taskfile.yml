# dash/Taskfile.yml
version: "3"

tasks:
  setup:
    desc: Setup Dash dependencies
    cmds:
      - pnpm install
      - pnpm exec playwright install

  dev:
    desc: Run Dash in dev mode
    cmds:
      - pnpm dev

  build:
    desc: Build Dash bundle
    cmds:
      - pnpm build

  test:
    desc: Run Dash unit tests
    cmds:
      - pnpm test

  test:e2e:
    desc: Run Dash E2E tests
    cmds:
      - pnpm exec playwright test

  lint:
    desc: Lint Dash
    cmds:
      - pnpm lint

  format:
    desc: Format Dash code
    cmds:
      - pnpm exec biome format . --write

  logs:tail:
    desc: Tail application logs
    cmds:
      - tail -f {{.LOG_DIR}}/*.log
    vars:
      LOG_DIR: '{{default "../.opus/logs" .OPUS_LOG_DIR}}'

  logs:clear:
    desc: Clear application logs
    cmds:
      - rm -rf {{.LOG_DIR}}/*.log
    vars:
      LOG_DIR: '{{default "../.opus/logs" .OPUS_LOG_DIR}}'

